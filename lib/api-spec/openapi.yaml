openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dead Zone Tracker API (India)
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: deadzones
    description: Deadzone reports
  - name: stats
    description: Aggregate statistics
  - name: clusters
    description: DBSCAN cluster analysis
  - name: routing
    description: Signal-aware route planning
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /deadzones:
    get:
      operationId: listDeadzones
      tags: [deadzones]
      summary: List all deadzone reports
      parameters:
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/DeadzoneType"
        - in: query
          name: severity
          schema:
            $ref: "#/components/schemas/DeadzoneSeverity"
        - in: query
          name: carrier
          schema:
            type: string
      responses:
        "200":
          description: List of deadzones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deadzone"
    post:
      operationId: createDeadzone
      tags: [deadzones]
      summary: Report a new deadzone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeadzone"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deadzone"
  /deadzones/{id}:
    get:
      operationId: getDeadzone
      tags: [deadzones]
      summary: Get a deadzone by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deadzone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeadzoneDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteDeadzone
      tags: [deadzones]
      summary: Delete a deadzone report
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /deadzones/{id}/confirm:
    post:
      operationId: confirmDeadzone
      tags: [deadzones]
      summary: Confirm a deadzone report (vote it as still bad)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deadzone"
  /deadzones/recent:
    get:
      operationId: listRecentDeadzones
      tags: [deadzones]
      summary: List most recent deadzone reports
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deadzone"
  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Aggregate dashboard statistics
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"
  /stats/hotspots:
    get:
      operationId: getHotspots
      tags: [stats]
      summary: Geographic clusters with the most deadzones
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 8
      responses:
        "200":
          description: Hotspot clusters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotspot"
  /stats/carriers:
    get:
      operationId: getCarrierStats
      tags: [stats]
      summary: Deadzone counts grouped by carrier
      responses:
        "200":
          description: Carrier breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CarrierStat"
  /signal-status:
    get:
      operationId: getSignalStatus
      tags: [routing]
      summary: Real-time weighted signal status at a point
      description: >-
        Returns a weighted-average signal classification for the area around the
        given coordinate. Reports from the last 24 hours are weighted by recency
        (linear decay) and proximity (inverse distance).
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
        - in: query
          name: lng
          required: true
          schema:
            type: number
        - in: query
          name: radiusKm
          schema:
            type: number
            default: 1.5
      responses:
        "200":
          description: Signal status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalStatus"
  /routes:
    get:
      operationId: getRoutes
      tags: [routing]
      summary: Compare route alternatives by signal coverage
      description: >-
        Fetches up to 3 alternative driving routes between source and
        destination, samples points along each, and scores them by predicted
        signal quality. Recommends the route with the best signal score.
      parameters:
        - in: query
          name: fromLat
          required: true
          schema:
            type: number
        - in: query
          name: fromLng
          required: true
          schema:
            type: number
        - in: query
          name: toLat
          required: true
          schema:
            type: number
        - in: query
          name: toLng
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Compared routes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteComparison"
        "502":
          description: Upstream routing provider failed
  /clusters:
    get:
      operationId: getClusters
      tags: [clusters]
      summary: DBSCAN clusters of nearby low-signal reports
      parameters:
        - in: query
          name: epsKm
          description: DBSCAN neighborhood radius in kilometers
          schema:
            type: number
            default: 2
        - in: query
          name: minPts
          description: DBSCAN minimum points to form a dense cluster
          schema:
            type: integer
            default: 3
      responses:
        "200":
          description: Clusters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cluster"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    DeadzoneType:
      type: string
      enum: [cellular, wifi, gps, satellite]
    DeadzoneSeverity:
      type: string
      enum: [low, medium, high, total]
    Deadzone:
      type: object
      required:
        [
          id,
          title,
          description,
          type,
          severity,
          latitude,
          longitude,
          carrier,
          reporter,
          confirmations,
          createdAt,
        ]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/DeadzoneType"
        severity:
          $ref: "#/components/schemas/DeadzoneSeverity"
        signalStrength:
          type: integer
          nullable: true
          description: Measured signal strength in dBm (e.g. -110)
        latitude:
          type: number
        longitude:
          type: number
        carrier:
          type: string
        reporter:
          type: string
        confirmations:
          type: integer
        createdAt:
          type: string
          format: date-time
    DeadzoneDetail:
      allOf:
        - $ref: "#/components/schemas/Deadzone"
        - type: object
          properties:
            address:
              type: string
              nullable: true
    CreateDeadzone:
      type: object
      required:
        [title, description, type, severity, latitude, longitude, carrier, reporter]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        type:
          $ref: "#/components/schemas/DeadzoneType"
        severity:
          $ref: "#/components/schemas/DeadzoneSeverity"
        signalStrength:
          type: integer
          description: Measured signal strength in dBm (e.g. -110)
        latitude:
          type: number
        longitude:
          type: number
        carrier:
          type: string
        reporter:
          type: string
        address:
          type: string
    StatsSummary:
      type: object
      required:
        [
          totalReports,
          totalConfirmations,
          uniqueCarriers,
          activeCities,
          byType,
          bySeverity,
        ]
      properties:
        totalReports:
          type: integer
        totalConfirmations:
          type: integer
        uniqueCarriers:
          type: integer
        activeCities:
          type: integer
        avgSignalStrength:
          type: number
          nullable: true
        byType:
          type: array
          items:
            type: object
            required: [type, count]
            properties:
              type:
                $ref: "#/components/schemas/DeadzoneType"
              count:
                type: integer
        bySeverity:
          type: array
          items:
            type: object
            required: [severity, count]
            properties:
              severity:
                $ref: "#/components/schemas/DeadzoneSeverity"
              count:
                type: integer
    Hotspot:
      type: object
      required: [label, latitude, longitude, count, topType]
      properties:
        label:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        count:
          type: integer
        topType:
          $ref: "#/components/schemas/DeadzoneType"
    CarrierStat:
      type: object
      required: [carrier, count, avgConfirmations]
      properties:
        carrier:
          type: string
        count:
          type: integer
        avgConfirmations:
          type: number
        avgSignalStrength:
          type: number
          nullable: true
    Cluster:
      type: object
      required:
        [
          id,
          centroidLat,
          centroidLng,
          count,
          radiusKm,
          confidence,
          topSeverity,
          topCarrier,
          lastUpdated,
        ]
      properties:
        id:
          type: integer
        centroidLat:
          type: number
        centroidLng:
          type: number
        count:
          type: integer
        radiusKm:
          type: number
        confidence:
          type: number
          description: Weighted confidence score 0-1 based on recency, density and confirmations
        avgSignalStrength:
          type: number
          nullable: true
        topSeverity:
          $ref: "#/components/schemas/DeadzoneSeverity"
        topCarrier:
          type: string
        lastUpdated:
          type: string
          format: date-time
        reportIds:
          type: array
          items:
            type: integer
    SignalClass:
      type: string
      enum: [strong, moderate, dead, unknown]
      description: Strong (>-90 dBm), Moderate (-110 to -90), Dead (<-110)
    SignalStatus:
      type: object
      required:
        [latitude, longitude, status, reportCount, confidence, lastUpdated]
      properties:
        latitude:
          type: number
        longitude:
          type: number
        avgSignal:
          type: number
          nullable: true
          description: Weighted average dBm across nearby reports
        status:
          $ref: "#/components/schemas/SignalClass"
        reportCount:
          type: integer
        confidence:
          type: number
          description: 0-1 confidence based on report density and recency
        lastUpdated:
          type: string
          format: date-time
          nullable: true
        radiusKm:
          type: number
    RouteSegment:
      type: object
      required: [latitude, longitude, status]
      properties:
        latitude:
          type: number
        longitude:
          type: number
        status:
          $ref: "#/components/schemas/SignalClass"
        avgSignal:
          type: number
          nullable: true
    RouteOption:
      type: object
      required:
        [
          id,
          label,
          distanceKm,
          durationMin,
          geometry,
          segments,
          deadCount,
          moderateCount,
          strongCount,
          unknownCount,
          signalScore,
        ]
      properties:
        id:
          type: integer
        label:
          type: string
        distanceKm:
          type: number
        durationMin:
          type: number
        geometry:
          type: array
          description: Polyline as [lat, lng] pairs
          items:
            type: array
            items:
              type: number
        segments:
          type: array
          items:
            $ref: "#/components/schemas/RouteSegment"
        deadCount:
          type: integer
        moderateCount:
          type: integer
        strongCount:
          type: integer
        unknownCount:
          type: integer
        signalScore:
          type: number
          description: 0-100 score (higher = better signal)
    RouteComparison:
      type: object
      required: [routes, recommendedId, shortestId]
      properties:
        routes:
          type: array
          items:
            $ref: "#/components/schemas/RouteOption"
        recommendedId:
          type: integer
          description: Route id with the best signal score
        shortestId:
          type: integer
          description: Route id with the shortest distance
        provider:
          type: string
